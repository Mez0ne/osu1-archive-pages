  <style>
:root { color-scheme: light; --ink:#172126; --muted:#5d6b72; --line:#d9e0e3; --paper:#ffffff;
  --soft:#f4f7f8; --accent:#007c91; --ok:#176b45; --modified:#875600;
  --warn:#a52a2a; --warn-bg:#fff2f1; }
* { box-sizing: border-box; }
body { margin:0; background:var(--paper); color:var(--ink); font:14px/1.55 system-ui,-apple-system,"Segoe UI",sans-serif; letter-spacing:0; }
a { color:var(--accent); overflow-wrap:anywhere; }
a:focus-visible, summary:focus-visible { outline:3px solid #9bdce5; outline-offset:3px; }
.skip-link { position:fixed; top:8px; left:8px; z-index:10; transform:translateY(-160%);
  padding:8px 11px; background:#fff; color:var(--ink); border:2px solid var(--accent); font-weight:700; }
.skip-link:focus { transform:translateY(0); }
.topbar { border-bottom:4px solid var(--accent); background:#10191d; color:white; }
.topbar-inner, main { width:min(1180px, calc(100% - 32px)); margin:0 auto; }
.topbar-inner { min-height:76px; display:flex; align-items:center; justify-content:space-between; gap:20px; }
.brand { font-size:20px; font-weight:700; }
.subtitle { color:#b9c7cc; font-size:13px; }
.topbar-actions { display:flex; align-items:center; justify-content:flex-end; gap:18px; }
.language-switch { color:#fff; font-size:13px; font-weight:650; white-space:nowrap; }
.language-switch:focus-visible { outline:3px solid #57c8d8; outline-offset:3px; }
main { padding:28px 0 48px; }
h1 { font-size:28px; line-height:1.2; margin:0 0 8px; }
h2 { font-size:19px; margin:32px 0 10px; border-bottom:1px solid var(--line); padding-bottom:7px; }
p { margin:7px 0; }
.lede { color:var(--muted); margin-bottom:24px; }
.stats { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); border:1px solid var(--line); }
.stat { min-width:0; padding:14px 16px; border-right:1px solid var(--line); background:var(--soft); }
.stat:last-child { border-right:0; }
.stat-label { color:var(--muted); font-size:12px; }
.stat-value { display:block; margin-top:3px; font-size:18px; font-weight:700; overflow-wrap:anywhere;
  font-variant-numeric:tabular-nums; }
.stat-detail { display:block; margin-top:1px; color:var(--muted); font-size:12px; }
.version-nav { display:flex; align-items:stretch; justify-content:space-between; gap:18px; margin:14px 0 20px; }
.version-nav.bottom { margin:30px 0 0; padding-top:15px; border-top:1px solid var(--line); }
.version-nav-link { display:flex; min-width:0; flex-direction:column; line-height:1.35; text-decoration:none; }
.version-nav-link.next { margin-left:auto; text-align:right; }
.version-nav-direction { color:var(--muted); font-size:11px; font-weight:650; }
.version-nav-version { font-weight:700; font-variant-numeric:tabular-nums; }
.report-meta { display:grid; grid-template-columns:max-content minmax(0,1fr); gap:8px 18px;
  margin:22px 0; padding:14px 16px; border:1px solid var(--line); background:#fbfcfc; }
.report-meta dt { color:var(--muted); font-size:12px; font-weight:650; }
.report-meta dd { min-width:0; margin:0; overflow-wrap:anywhere; }
.report-meta code, .report-meta a { overflow-wrap:anywhere; word-break:break-word; }
.notice { border-left:4px solid var(--ok); background:#edf8f2; padding:12px 14px; margin:20px 0; }
.notice.warning { border-color:var(--warn); background:var(--warn-bg); }
.notice strong { display:block; }
.anomaly { padding:11px 0; border-bottom:1px solid #f0c9c5; }
.anomaly:last-child { border-bottom:0; }
.table-wrap { overflow-x:auto; border:1px solid var(--line); }
table { width:100%; border-collapse:collapse; min-width:760px; }
th, td { padding:9px 11px; text-align:left; vertical-align:top; border-bottom:1px solid var(--line); }
th { background:var(--soft); color:#39484f; font-size:12px; white-space:nowrap; }
tbody tr:hover { background:#f8fafb; }
tbody tr:last-child td { border-bottom:0; }
code, time { font-variant-numeric:tabular-nums; }
code { font:12px/1.45 ui-monospace,SFMono-Regular,Consolas,monospace; overflow-wrap:anywhere; }
.status { font-weight:700; }
.status.ok { color:var(--ok); }
.status.warning, .change-removed { color:var(--warn); }
.change-added { color:var(--ok); }
.change-modified { color:var(--modified); }
.change-section-title { border:0; border-left:3px solid currentColor; padding:6px 9px; background:#f7faf9; }
.change-section-title.change-modified { background:#fff9ec; }
.change-section-title.change-removed { background:#fff4f3; }
.muted { color:var(--muted); }
.firmware-versions { display:inline-flex; min-width:0; flex-direction:column; gap:2px; font-variant-numeric:tabular-nums; }
.firmware-version { display:grid; grid-template-columns:58px minmax(0,1fr); gap:7px; }
.firmware-version-label { color:var(--muted); font-size:11px; font-weight:650; }
.version-stack { display:inline-flex; min-width:0; flex-direction:column; gap:1px; font-variant-numeric:tabular-nums; }
.version-detail { color:var(--muted); font-size:12px; font-weight:500; line-height:1.4; overflow-wrap:anywhere; }
details { border:1px solid var(--line); padding:11px 13px; }
summary { cursor:pointer; font-weight:650; }
@media (min-width:761px) {
  .table-wrap thead th { position:sticky; top:0; z-index:1; box-shadow:0 1px 0 var(--line); }
}
@media (max-width:760px) {
  .topbar-inner { align-items:flex-start; flex-direction:column; justify-content:center; padding:14px 0; gap:2px; }
  .topbar-actions { width:100%; justify-content:space-between; gap:16px; margin-top:5px; }
  .stats { grid-template-columns:repeat(2,minmax(0,1fr)); }
  .stat:nth-child(2) { border-right:0; }
  .stat:nth-child(-n+2) { border-bottom:1px solid var(--line); }
  .history-wrap { overflow:visible; border:0; }
  .history-table { min-width:0; }
  .history-table thead { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
  .history-table tbody { display:grid; gap:12px; }
  .history-table tr { display:block; border:1px solid var(--line); }
  .history-table td { display:grid; grid-template-columns:96px minmax(0,1fr); gap:12px; border-bottom:1px solid var(--line); }
  .history-table tbody tr:last-child td { border-bottom:1px solid var(--line); }
  .history-table td::before { content:attr(data-label); color:var(--muted); font-size:12px; font-weight:650; }
  .history-table td:first-child { display:block; background:var(--soft); font-size:16px; font-weight:700; }
  .history-table td:first-child::before { display:none; }
  .history-table tbody tr td:last-child { border-bottom:0; }
  .report-meta { grid-template-columns:1fr; gap:2px; }
  .report-meta dd + dt { margin-top:7px; }
  h1 { font-size:24px; }
}
@media (min-width:360px) and (max-width:420px) {
  .stats .stat:first-child { padding-inline:12px; }
  .stats .stat:first-child .stat-value { font-size:15px; overflow-wrap:normal; white-space:nowrap; }
}
@media (max-width:359px) {
  .stats { grid-template-columns:1fr; }
  .stat { border-right:0; border-bottom:1px solid var(--line); }
  .stat:last-child { border-bottom:0; }
  .version-nav { flex-direction:column; gap:10px; }
  .version-nav-link.next { margin-left:0; text-align:left; }
}

.file-controls { display:grid; grid-template-columns:minmax(240px,1fr) 160px 160px 220px; gap:12px;
  align-items:end; margin:24px 0 0; }
.control-field { min-width:0; }
.control-label { display:block; margin-bottom:5px; color:var(--muted); font-size:12px; font-weight:650; }
.control-input, .control-select { width:100%; min-height:42px; border:1px solid #aebbc0; border-radius:4px;
  padding:8px 11px; background:#fff; color:var(--ink);
  font:14px/1.4 system-ui,-apple-system,"Segoe UI",sans-serif; letter-spacing:0; }
.control-input { font-size:16px; }
.control-input:focus, .control-select:focus { border-color:var(--accent); outline:3px solid #ccebf0; outline-offset:1px; }
.file-toolbar { display:flex; align-items:center; justify-content:space-between; gap:16px; min-height:43px; }
.file-result-status { margin:9px 0; color:var(--muted); font-size:13px; }
.file-reset { border:0; padding:4px 0; background:transparent; color:var(--accent); cursor:pointer; font:650 13px/1.4 system-ui,-apple-system,"Segoe UI",sans-serif; letter-spacing:0; }
.file-reset:focus-visible { outline:3px solid #ccebf0; outline-offset:2px; }
.file-inventory { border:1px solid var(--line); }
.file-inventory-head, .file-summary-grid { display:grid;
  grid-template-columns:minmax(260px,1.8fr) 80px 90px minmax(210px,1fr) 110px;
  align-items:center; gap:12px; }
.file-inventory-head { padding:8px 12px 8px 34px; background:var(--soft); color:#39484f; font-size:12px; font-weight:650; }
.file-entry { border:0; border-bottom:1px solid var(--line); padding:0; }
.file-entry:last-child { border-bottom:0; }
.file-entry > summary { min-height:48px; padding:10px 12px; cursor:pointer; }
.file-entry[open] > summary { background:#f8fafb; }
.file-summary-grid { min-width:0; }
.file-summary-path { min-width:0; font-weight:650; }
.file-summary-path code { font-size:13px; }
.file-summary-kind, .file-summary-count, .file-summary-range { color:var(--muted); font-size:12px; }
.file-summary-count { font-variant-numeric:tabular-nums; }
.file-summary-range { overflow-wrap:anywhere; }
.file-entry-state { font-weight:700; }
.file-entry-state.present { color:var(--ok); }
.file-entry-state.absent { color:var(--warn); }
.file-reappeared { display:block; color:var(--modified); font-size:11px; font-weight:650; }
.file-entry-body { padding:14px 16px 18px 34px; border-top:1px solid var(--line); background:#fff; }
.file-variants { color:var(--muted); font-size:12px; }
.file-entry-body h2 { margin:18px 0 7px; padding:0; border:0; font-size:14px; }
.file-entry-body h2:first-of-type { margin-top:12px; }
.lifecycle-list, .file-version-list { margin:0; padding-left:20px; }
.lifecycle-list li { margin:4px 0; }
.file-versions { margin-top:16px; border:0; padding:0; }
.file-versions > summary { width:fit-content; color:var(--accent); }
.file-versions[open] > summary { margin-bottom:6px; }
.file-version-list { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); column-gap:24px; }
.file-version-list li { min-width:0; margin:4px 0; }
.file-version-meta { display:block; color:var(--muted); font-size:12px; overflow-wrap:anywhere; }
.file-empty { padding:28px 16px; color:var(--muted); text-align:center; }
@media (max-width:900px) {
  .file-controls { grid-template-columns:minmax(0,1fr) minmax(150px,.45fr); }
  .file-inventory-head, .file-summary-grid {
    grid-template-columns:minmax(220px,1.5fr) 70px 80px minmax(180px,1fr) 100px;

  .file-version-list { grid-template-columns:1fr; }

@media (max-width:480px) {
  .file-controls { grid-template-columns:1fr; }
  .file-controls .control-field:first-child { grid-column:auto; }
  .file-toolbar { align-items:flex-start; flex-direction:column; gap:0; }
}

  <script>
(() => {
  "use strict";
  const currentLocale = "zh-CN";
  const targetLocale = "en";
  const alternateHref = "en/files.html";
  const storageKey = "osu1-archive-language";

  function alternateUrl() {
    const url = new URL(alternateHref, location.href);
    url.search = location.search;
    url.hash = location.hash;
    return url.href;
  }

  let storedLocale = "";
  try {
    storedLocale = localStorage.getItem(storageKey) || "";
  } catch (_error) {
    storedLocale = "";
  }
  if (storedLocale !== "zh-CN" && storedLocale !== "en") storedLocale = "";
  if (currentLocale === "zh-CN") {
    const browserLocale = String(
      (navigator.languages && navigator.languages[0]) || navigator.language || ""
    ).toLowerCase();
    const wantsEnglish = storedLocale === "en"
      || (!storedLocale && !browserLocale.startsWith("zh"));
    if (wantsEnglish) location.replace(alternateUrl());
  }

  window.addEventListener("DOMContentLoaded", () => {
    const control = document.querySelector("[data-language-switch]");
    if (!control) return;
    control.addEventListener("click", (event) => {
      event.preventDefault();
      try {
        localStorage.setItem(storageKey, targetLocale);
      } catch (_error) {
        // The explicit language URL still works when storage is unavailable.
      }
      location.assign(alternateUrl());
    });
  });
})();
</script>

    status.textContent = "File index unavailable";
    return;
  }
  let payload;
  try {
    payload = JSON.parse(dataElement.textContent || "{}");
  } catch (_error) {
    status.textContent = String(strings.index_read_failed || "File index unavailable");
    return;
  }

  function decodePayload(value) {
    if (Number(value.schema_version) !== 2) {
      return [];
    }
    const rawSnapshots = Array.isArray(value.snapshots) ? value.snapshots : [];
    const snapshots = rawSnapshots.map((item) => ({
      snapshot_id: String(item?.[0] || ""),
      osu1_version: String(item?.[1] || ""),
      package_version: String(item?.[2] || ""),
      page: String(item?.[3] || ""),
      version_detail: String(item?.[4] || ""),
    }));
    const hashes = Array.isArray(value.hashes) ? value.hashes : [];
    return (Array.isArray(value.files) ? value.files : []).map((item) => {
      const key = String(item?.[0] || "");
      const variants = Array.isArray(item?.[1])
        ? item[1].map((path) => String(path))
        : [key];
      const rawObservations = Array.isArray(item?.[3]) ? item[3] : [];
      const versions = rawObservations.map((raw) => {
        const reference = snapshots[Number(raw?.[0])] || {};
        return {
          ...reference,
          path: variants[Number(raw?.[1])] || variants[0] || key,
          size: Number(raw?.[2]) || 0,
          sha256: String(hashes[Number(raw?.[3])] || ""),
        };
      });
      const intervals = [];
      let interval = null;
      rawObservations.forEach((raw, position) => {
        const snapshotIndex = Number(raw?.[0]);
        const previousIndex = position
          ? Number(rawObservations[position - 1]?.[0])
          : -2;
        const reference = snapshots[snapshotIndex] || {};
        if (!interval || snapshotIndex !== previousIndex + 1) {
          interval = {
            start_type: snapshotIndex === 0 ? "baseline" : "appeared",
            started_in: reference,
            last_present_in: reference,
            disappeared_in: null,
            version_count: 1,
          };
          intervals.push(interval);
        } else {
          interval.last_present_in = reference;
          interval.version_count += 1;
        }
        const nextIndex = position + 1 < rawObservations.length
          ? Number(rawObservations[position + 1]?.[0])
          : snapshots.length;
        if (nextIndex !== snapshotIndex + 1 && snapshotIndex + 1 < snapshots.length) {
          interval.disappeared_in = snapshots[snapshotIndex + 1];
        }
      });
      const lastRaw = rawObservations.at(-1);
      const currentlyPresent = Boolean(
        lastRaw && Number(lastRaw[0]) === snapshots.length - 1
      );
      return {
        key,
        path: versions.at(-1)?.path || variants[0] || key,
        path_variants: variants,
        kind: String(item?.[2] || "unknown"),
        currently_present: currentlyPresent,
        intervals,
        versions,
      };
    });
  }

  if (Number(payload.schema_version) !== 2 || !Array.isArray(payload.files)) {
    status.textContent = String(strings.index_read_failed || "File index unavailable");
    return;
  }
  const files = decodePayload(payload);
  const entries = new Map();
  const defaultSort = "name-asc";
  const validStates = new Set(["all", "present", "absent", "reappeared"]);
  const validSorts = new Set([
    "name-asc", "name-desc", "count-desc", "count-asc",
    "status-present", "status-absent", "kind-asc",
  ]);

  function format(key, values = {}) {
    const template = Object.hasOwn(strings, key) ? strings[key] : key;
    return String(template).replace(/\{(\w+)\}/g, (_match, name) => {
      return Object.hasOwn(values, name) ? String(values[name]) : "";
    });
  }

  function plural(oneKey, otherKey, count) {
    return format(count === 1 ? oneKey : otherKey, { count });
  }

  function displayKind(rawKind) {
    const kind = String(rawKind || "unknown");
    if (kind === "no_extension") return format("no_extension");
    return /^[a-z0-9]+$/i.test(kind) ? `.${kind}` : kind;
  }

  function snapshotBaseLabel(reference) {
    if (reference && typeof reference.osu1_version === "string" && reference.osu1_version) {
      const detail = typeof reference.version_detail === "string"
        ? reference.version_detail
        : "";
      return detail
        ? `${reference.osu1_version} · 2BL ${detail}`
        : reference.osu1_version;
    }
    const raw = reference && reference.package_version
      ? reference.package_version
      : format("unknown");
    return format("unknown_package", { package: raw });
  }

  function shortSnapshotLabel(reference) {
    if (reference && reference.osu1_version) return String(reference.osu1_version);
    if (reference && reference.package_version) return `Package ${reference.package_version}`;
    return format("unknown");
  }

  function snapshotFingerprint(reference) {
    const snapshot = String(reference && reference.snapshot_id ? reference.snapshot_id : "");
    const match = snapshot.match(/-([0-9a-f]{12,64})$/i);
    return match ? match[1].slice(0, 12) : snapshot;
  }

  function duplicateVersionLabels(file) {
    const references = new Map();
    const add = (reference) => {
      if (reference && reference.snapshot_id) references.set(reference.snapshot_id, reference);
    };
    (file.versions || []).forEach(add);
    (file.intervals || []).forEach((interval) => {
      add(interval.started_in);
      add(interval.last_present_in);
      add(interval.disappeared_in);
    });
    const counts = new Map();
    references.forEach((reference) => {
      const label = snapshotBaseLabel(reference);
      counts.set(label, (counts.get(label) || 0) + 1);
    });
    return counts;
  }

  function snapshotLabel(reference, duplicateLabels) {
    const base = snapshotBaseLabel(reference);
    if ((duplicateLabels.get(base) || 0) < 2) return base;
    return `${base} · ${snapshotFingerprint(reference)}`;
  }

  function appendSnapshotLink(parent, reference, duplicateLabels) {
    const page = String(reference && reference.page ? reference.page : "");
    const element = /^updates\/[A-Za-z0-9._-]+\.html$/.test(page)
      ? document.createElement("a")
      : document.createElement("span");
    if (element instanceof HTMLAnchorElement) element.href = page;
    element.textContent = snapshotLabel(reference || {}, duplicateLabels);
    if (reference && reference.snapshot_id) element.title = reference.snapshot_id;
    parent.append(element);
  }

  function formatSize(rawValue) {
    let value = Number(rawValue);
    if (!Number.isFinite(value) || value < 0) value = 0;
    const units = ["B", "KiB", "MiB", "GiB"];
    let unit = 0;
    while (value >= 1024 && unit < units.length - 1) {
      value /= 1024;
      unit += 1;
    }
    return unit === 0 ? `${Math.round(value)} B` : `${value.toFixed(2)} ${units[unit]}`;
  }

  function renderVariants(parent, file) {
    const variants = Array.isArray(file.path_variants) ? file.path_variants : [];
    if (variants.length < 2) return;
    const line = document.createElement("div");
    line.className = "file-variants";
    line.append(document.createTextNode(format("case_variants")));
    variants.forEach((variant, index) => {
      if (index) line.append(document.createTextNode(" / "));
      const code = document.createElement("code");
      code.textContent = variant;
      line.append(code);
    });
    parent.append(line);
  }

  function renderLifecycle(parent, file, duplicateLabels) {
    const heading = document.createElement("h2");
    heading.textContent = format("lifecycle");
    const list = document.createElement("ol");
    list.className = "lifecycle-list";
    (file.intervals || []).forEach((interval) => {
      const item = document.createElement("li");
      item.append(document.createTextNode(
        format(interval.start_type === "baseline" ? "first_recorded_in" : "appeared_in")
      ));
      appendSnapshotLink(item, interval.started_in, duplicateLabels);
      if (interval.disappeared_in) {
        if (interval.last_present_in
            && interval.last_present_in.snapshot_id !== interval.started_in.snapshot_id) {
          item.append(document.createTextNode(format("last_present_in")));
          appendSnapshotLink(item, interval.last_present_in, duplicateLabels);
        }
        item.append(document.createTextNode(format("absent_starting")));
        appendSnapshotLink(item, interval.disappeared_in, duplicateLabels);
        item.append(document.createTextNode(format("absent_suffix")));
      } else {
        item.append(document.createTextNode(format("present_as_of")));
        appendSnapshotLink(item, interval.last_present_in, duplicateLabels);
        item.append(document.createTextNode(format("present_suffix")));
      }
      list.append(item);
    });
    parent.append(heading, list);
  }

  function renderVersions(parent, file, duplicateLabels) {
    const versions = Array.isArray(file.versions) ? file.versions : [];
    const details = document.createElement("details");
    details.className = "file-versions";
    const summary = document.createElement("summary");
    summary.textContent = plural(
      "appearance_version",
      "appearance_versions",
      versions.length
    );
    const list = document.createElement("ul");
    list.className = "file-version-list";
    details.append(summary, list);
    details.addEventListener("toggle", () => {
      if (!details.open || details.dataset.loaded === "true") return;
      const fragment = document.createDocumentFragment();
      versions.forEach((observation) => {
        const item = document.createElement("li");
        appendSnapshotLink(item, observation, duplicateLabels);
        const metadata = document.createElement("span");
        metadata.className = "file-version-meta";
        const digest = String(observation.sha256 || "");
        metadata.textContent = `${formatSize(observation.size)} · SHA-256 ${digest.slice(0, 16) || format("unknown")}`;
        item.append(metadata);
        fragment.append(item);
      });
      list.append(fragment);
      details.dataset.loaded = "true";
    });
    parent.append(details);
  }

  function ensureDetails(file, panel) {
    if (panel.dataset.loaded === "true") return;
    const duplicateLabels = duplicateVersionLabels(file);
    renderVariants(panel, file);
    renderLifecycle(panel, file, duplicateLabels);
    renderVersions(panel, file, duplicateLabels);
    panel.dataset.loaded = "true";
  }

  function fileHashKey() {
    try {
      return new URLSearchParams(location.hash.slice(1)).get("file") || "";
    } catch (_error) {
      return "";
    }
  }

  function setFileHash(key) {
    const fragment = key
      ? `#${new URLSearchParams({ file: key }).toString()}`
      : "";
    history.replaceState(null, "", `${location.pathname}${location.search}${fragment}`);
  }

  function createEntry(file) {
    const entry = document.createElement("details");
    entry.className = "file-entry";
    const summary = document.createElement("summary");
    const grid = document.createElement("span");
    grid.className = "file-summary-grid";

    const pathCell = document.createElement("span");
    pathCell.className = "file-summary-path";
    const path = document.createElement("code");
    path.textContent = file.path || file.key || "";
    pathCell.append(path);

    const kind = document.createElement("span");
    kind.className = "file-summary-kind";
    kind.textContent = displayKind(file.kind);

    const count = document.createElement("span");
    count.className = "file-summary-count";
    const appearanceCount = (file.versions || []).length;
    count.textContent = plural("occurrence_one", "occurrence_other", appearanceCount);

    const versions = Array.isArray(file.versions) ? file.versions : [];
    const first = versions[0] || (file.intervals || [])[0]?.started_in;
    const last = versions[versions.length - 1] || (file.intervals || []).at(-1)?.last_present_in;
    const range = document.createElement("span");
    range.className = "file-summary-range";
    const firstLabel = shortSnapshotLabel(first);
    const lastLabel = shortSnapshotLabel(last);
    range.textContent = firstLabel === lastLabel ? firstLabel : `${firstLabel} → ${lastLabel}`;

    const stateCell = document.createElement("span");
    stateCell.className = "file-summary-state";
    const state = document.createElement("span");
    state.className = `file-entry-state ${file.currently_present ? "present" : "absent"}`;
    state.textContent = format(file.currently_present ? "still_present" : "disappeared");
    stateCell.append(state);
    if ((file.intervals || []).length > 1) {
      const reappeared = document.createElement("span");
      reappeared.className = "file-reappeared";
      reappeared.textContent = format("reappeared");
      stateCell.append(reappeared);
    }

    grid.append(pathCell, kind, count, range, stateCell);
    summary.append(grid);
    const panel = document.createElement("div");
    panel.className = "file-entry-body";
    entry.append(summary, panel);
    entry.addEventListener("toggle", () => {
      const key = String(file.key || "");
      if (entry.open) {
        ensureDetails(file, panel);
        setFileHash(key);
      } else if (fileHashKey() === key) {
        setFileHash("");
      }
    });
    return entry;
  }

  function compareNames(left, right) {
    return String(left.key || "").localeCompare(
      String(right.key || ""), "en", { sensitivity: "base", numeric: true }
    );
  }

  function compareFiles(left, right, mode) {
    let result = 0;
    if (mode === "name-desc") result = -compareNames(left, right);
    else if (mode === "count-desc") result = (right.versions || []).length - (left.versions || []).length;
    else if (mode === "count-asc") result = (left.versions || []).length - (right.versions || []).length;
    else if (mode === "status-present") result = Number(!left.currently_present) - Number(!right.currently_present);
    else if (mode === "status-absent") result = Number(left.currently_present) - Number(right.currently_present);
    else if (mode === "kind-asc") {
      result = displayKind(left.kind).localeCompare(
        displayKind(right.kind), "en", { sensitivity: "base" }
      );
    } else result = compareNames(left, right);
    return result || compareNames(left, right);
  }

  function matchesFilters(file, query, state, kind) {
    const variants = Array.isArray(file.path_variants) ? file.path_variants : [];
    const searchText = [file.key, file.path, ...variants].join("\n").toLowerCase();
    if (query && !searchText.includes(query)) return false;
    if (kind !== "all" && String(file.kind || "unknown") !== kind) return false;
    if (state === "present" && !file.currently_present) return false;
    if (state === "absent" && file.currently_present) return false;
    if (state === "reappeared" && (file.intervals || []).length < 2) return false;
    return true;
  }

  function syncUrl() {
    const params = new URLSearchParams();
    if (input.value.trim()) params.set("q", input.value.trim());
    if (stateFilter.value !== "all") params.set("status", stateFilter.value);
    if (kindFilter.value !== "all") params.set("kind", kindFilter.value);
    if (sortControl.value !== defaultSort) params.set("sort", sortControl.value);
    const query = params.toString();
    history.replaceState(
      null,
      "",
      `${location.pathname}${query ? `?${query}` : ""}${location.hash}`
    );
  }

  function updateResults({ updateUrl = true } = {}) {
    const query = input.value.trim().toLowerCase();
    const state = stateFilter.value;
    const kind = kindFilter.value;
    const sort = sortControl.value;
    const matches = files
      .filter((file) => matchesFilters(file, query, state, kind))
      .sort((left, right) => compareFiles(left, right, sort));

    const fragment = document.createDocumentFragment();
    matches.forEach((file) => {
      const key = String(file.key || "");
      let entry = entries.get(key);
      if (!entry) {
        entry = createEntry(file);
        entries.set(key, entry);
      }
      fragment.append(entry);
    });
    if (!matches.length) {
      const empty = document.createElement("div");
      empty.className = "file-empty";
      empty.textContent = format("no_filter_matches");
      fragment.append(empty);
    }
    inventory.replaceChildren(fragment);
    status.textContent = format("result_ratio", {
      matches: matches.length,
      total: files.length,
    });
    reset.hidden = !query && state === "all" && kind === "all" && sort === defaultSort;
    if (updateUrl) syncUrl();
  }

  function restoreControls() {
    const params = new URLSearchParams(location.search);
    input.value = params.get("q") || "";
    const state = params.get("status") || "all";
    stateFilter.value = validStates.has(state) ? state : "all";
    const kind = params.get("kind") || "all";
    kindFilter.value = Array.from(kindFilter.options).some((option) => option.value === kind)
      ? kind
      : "all";
    const sort = params.get("sort") || defaultSort;
    sortControl.value = validSorts.has(sort) ? sort : defaultSort;
  }

  function openHashTarget() {
    const key = fileHashKey();
    const entry = entries.get(key);
    if (!entry || !entry.isConnected) return;
    entry.open = true;
    requestAnimationFrame(() => entry.scrollIntoView({ block: "start" }));
  }

  input.addEventListener("input", () => updateResults());
  stateFilter.addEventListener("change", () => updateResults());
  kindFilter.addEventListener("change", () => updateResults());
  sortControl.addEventListener("change", () => updateResults());
  reset.addEventListener("click", () => {
    input.value = "";
    stateFilter.value = "all";
    kindFilter.value = "all";
    sortControl.value = defaultSort;
    setFileHash("");
    updateResults();
    input.focus();
  });
  window.addEventListener("hashchange", openHashTarget);

  restoreControls();
  updateResults({ updateUrl: false });
  openHashTarget();
})();
</script>

</body>
</html>
